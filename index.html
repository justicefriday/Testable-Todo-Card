<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Todo Card</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>

<main class="container">

  <article class="todo-card" data-testid="test-todo-card">

    <!-- Checkbox -->
    <div class="top-row">

      <label class="checkbox-label">
        <input
          type="checkbox"
          data-testid="test-todo-complete-toggle"
          id="completeToggle"
        />
        Mark complete
      </label>

      <span
        class="status"
        data-testid="test-todo-status"
        aria-label="Task status"
        id="status"
      >
        Pending
      </span>
    </div>

    <!-- Title -->
    <h2 data-testid="test-todo-title" id="title">
      To Build Todo Card UI
    </h2>

    <!-- Description -->
    <p data-testid="test-todo-description">
      Create a fully accessible, responsive todo card with priority, tags, and live time remaining.
    </p>

    <!-- Priority -->
    <div
      class="priority"
      data-testid="test-todo-priority"
      aria-label="Task priority: High"
      id="priority"
    >
      High
    </div>

    <!-- Due Date -->
    <time
      data-testid="test-todo-due-date"
      id="dueDate"
      datetime="2026-04-12T18:00:00Z"
    >
      Due Apr 12, 2026
    </time>

    <!-- Time Remaining -->
    <div
      data-testid="test-todo-time-remaining"
      id="timeRemaining"
      aria-live="polite"
    >
      Calculating...
    </div>

    <!-- Tags -->
    <ul class="tags" data-testid="test-todo-tags" role="list">
      <li data-testid="test-todo-tag-work"> 💼Work</li>
      <li data-testid="test-todo-tag-urgent">⚠️Urgent</li>
      <li data-testid="test-todo-tag-design">🎨 Design</li>
    </ul>

    <!-- Actions -->
    <div class="actions">

      <button
        data-testid="test-todo-edit-button"
        aria-label="Edit task"
        onclick="editTask()"
      >
        ✏️
        Edit
      </button>

      <button
        data-testid="test-todo-delete-button"
        aria-label="Delete task"
        onclick="deleteTask()"
      >
        🗑️
        Delete
        
      </button>

    </div>

  </article>

</main>
<script src="script.js"></script>
</body>
</html>
